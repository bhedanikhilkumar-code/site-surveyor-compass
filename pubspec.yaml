name: geocompass_pro
description: GeoCompass Pro - Precision digital compass for construction site surveying with GPS, magnetometer, bubble level, and waypoint manager.

publish_to: 'none'

version: 4.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^4.0.0
  provider: ^6.1.5
  geolocator: ^11.1.0
  geocoding: ^3.0.0
  sensors_plus: ^4.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.69.2
  path_provider: ^2.1.0
  intl: ^0.17.0
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  vector_math: ^2.1.4
  geomag: ^0.2.1
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  share_plus: ^7.2.2
  image_picker: ^1.0.7
  qr_flutter: ^4.1.0
  record: ^5.0.4
  audioplayers: ^5.2.1
  pdf: ^3.10.7
  printing: ^5.12.0
  vibration: ^1.8.4
  speech_to_text: ^6.6.0
  exif: ^3.3.0
  mobile_scanner: ^4.0.0
  excel: ^4.0.6
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/compass_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/compass_icon.png"

flutter_native_splash:
  color: "#0f3460"
  image: assets/images/compass_icon.png
  android: true
  ios: false
